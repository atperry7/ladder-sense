# Build and publish a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
# The compiled mod jar is attached to the release, giving a stable public download
# URL that anyone (including a Modrinth modpack index) can link to.

name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a pre-release suffix (e.g. v1.2.0-rc.1) publish as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
